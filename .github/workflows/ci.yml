name: CI 自动测试

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    # 自动启动 PostgreSQL 服务
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: epc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'  # 自动缓存 npm 依赖，下次运行快 5 倍

      - name: 安装依赖
        run: npm ci --legacy-peer-deps

      - name: 生成 Prisma Client + 同步 Schema
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/epc_test?schema=public
        run: |
          npx prisma generate
          npx prisma db push

      - name: 代码规范检查
        run: npm run lint || echo "Lint 有警告，继续"

      - name: 构建 Next.js
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/epc_test?schema=public
        run: npm run build

      - name: 运行 DB 模型测试
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/epc_test?schema=public
        run: npx vitest run src/__tests__/db/ --reporter=verbose

      - name: 启动 Next.js 服务
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/epc_test?schema=public
        run: |
          npx next start -p 3000 &
          echo "等待服务就绪（最多 60 秒）..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 | grep -q "200\|302\|304"; then
              echo "✅ 服务启动成功 (${i}x 2 秒)"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ 服务启动超时！"
              cat /proc/*/fd/1 2>/dev/null || true
              exit 1
            fi
            sleep 2
          done

      - name: 初始化测试数据
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/epc_test?schema=public
        run: |
          echo "种子化测试数据..."
          RESP=$(curl -s -w "\n%{http_code}" -X POST http://localhost:3000/api/test-data \
            -H "Content-Type: application/json" \
            -d '{"action":"setup","projectId":"test-regression-project"}')
          HTTP_CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | sed '$d')
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ 种子数据初始化失败"
            exit 1
          fi
          echo "✅ 种子数据初始化成功"

      - name: 运行 API 集成测试
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/epc_test?schema=public
          TEST_BASE_URL: http://localhost:3000
        run: npx vitest run src/__tests__/api/ --reporter=verbose --bail=5
