<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>报价链接已失效</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
body{background:#f5f0eb;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:40px;max-width:480px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.06);}
.icon{font-size:56px;margin-bottom:20px;}
.title{font-size:18px;font-weight:700;color:#1e293b;margin-bottom:8px;}
.desc{font-size:14px;color:#64748b;margin-bottom:24px;line-height:1.6;}
.reason-box{background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:12px 16px;text-align:left;margin-bottom:24px;}
.reason-box .label{font-size:11px;font-weight:600;color:#c2410c;margin-bottom:4px;}
.reason-box .text{font-size:13px;color:#9a3412;}
.info-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:13px;}
.info-item .label{color:#94a3b8;}
.info-item .val{color:#334155;font-weight:500;}
.contract{font-size:13px;color:#64748b;margin-top:20px;padding-top:16px;border-top:1px solid #f1f5f9;}
.contract a{color:#1e3a5f;text-decoration:underline;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">⏰</div>
  <div class="title">报价链接已失效</div>
  <div class="desc">该询价链接已过期或已被采购方关闭，无法继续提交报价。</div>

  <div class="reason-box">
    <div class="label">失效原因</div>
    <div class="text">报价截止时间已过（2026-06-10 18:00），本轮询价已结束。</div>
  </div>

  <div style="text-align:left;">
    <div class="info-item"><span class="label">询价单号</span><span class="val">PO-2026-0042</span></div>
    <div class="info-item"><span class="label">项目名称</span><span class="val">某化工装置EPC总承包项目</span></div>
    <div class="info-item"><span class="label">供应商</span><span class="val">A公司</span></div>
    <div class="info-item"><span class="label">报价轮次</span><span class="val">第 2 轮</span></div>
  </div>

  <div class="contract">
    如有疑问，请联系采购方：<br>
    <a href="#">张经理 — 138xxxx1234</a>
  </div>
</div>
</body>
</html>
