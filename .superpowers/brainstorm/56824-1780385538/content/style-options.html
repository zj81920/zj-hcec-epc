<h2>选择整体视觉风格</h2>
<p class="subtitle">以下3种风格，你更倾向哪一种？点击选中</p>

<div class="cards">
  <div class="card" data-choice="enterprise" onclick="toggleSelect(this)">
    <div class="card-body">
      <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:8px;">
        <div style="width:8px;height:48px;border-radius:4px;background:linear-gradient(180deg,#1a365d,#2b6cb0);flex-shrink:0;"></div>
        <div>
          <h3>企业深蓝风</h3>
          <p class="subtitle" style="margin:0;">专业、稳重、行业标杆感</p>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
        <span style="background:#1a365d;color:#fff;padding:2px 10px;border-radius:4px;font-size:12px;">#1a365d</span>
        <span style="background:#2b6cb0;color:#fff;padding:2px 10px;border-radius:4px;font-size:12px;">#2b6cb0</span>
        <span style="background:#edf2f7;color:#333;padding:2px 10px;border-radius:4px;font-size:12px;">#edf2f7</span>
      </div>
      <div class="pros-cons" style="margin-top:12px;">
        <div class="pros"><ul><li>石油化工行业经典配色</li><li>视觉权重高，显专业</li></ul></div>
        <div class="cons"><ul><li>偏传统，略保守</li></ul></div>
      </div>
    </div>
  </div>

  <div class="card" data-choice="modern" onclick="toggleSelect(this)">
    <div class="card-body">
      <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:8px;">
        <div style="width:8px;height:48px;border-radius:4px;background:linear-gradient(180deg,#4f46e5,#06b6d4);flex-shrink:0;"></div>
        <div>
          <h3>现代SaaS风</h3>
          <p class="subtitle" style="margin:0;">明亮、清爽、科技感</p>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
        <span style="background:#4f46e5;color:#fff;padding:2px 10px;border-radius:4px;font-size:12px;">#4f46e5</span>
        <span style="background:#06b6d4;color:#fff;padding:2px 10px;border-radius:4px;font-size:12px;">#06b6d4</span>
        <span style="background:#f8fafc;color:#333;padding:2px 10px;border-radius:4px;font-size:12px;">#f8fafc</span>
      </div>
      <div class="pros-cons" style="margin-top:12px;">
        <div class="pros"><ul><li>视觉现代，用户友好</li><li>信息层级清晰</li></ul></div>
        <div class="cons"><ul><li>不如深蓝风稳重</li></ul></div>
      </div>
    </div>
  </div>

  <div class="card" data-choice="dark" onclick="toggleSelect(this)">
    <div class="card-body">
      <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:8px;">
        <div style="width:8px;height:48px;border-radius:4px;background:linear-gradient(180deg,#1e293b,#3b82f6);flex-shrink:0;"></div>
        <div>
          <h3>深色仪表盘风</h3>
          <p class="subtitle" style="margin:0;">高端、沉浸式数据展示</p>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
        <span style="background:#0f172a;color:#fff;padding:2px 10px;border-radius:4px;font-size:12px;">#0f172a</span>
        <span style="background:#3b82f6;color:#fff;padding:2px 10px;border-radius:4px;font-size:12px;">#3b82f6</span>
        <span style="background:#1e293b;color:#fff;padding:2px 10px;border-radius:4px;font-size:12px;">#1e293b</span>
      </div>
      <div class="pros-cons" style="margin-top:12px;">
        <div class="pros"><ul><li>视觉冲击力强</li><li>适合监控/仪表盘场景</li></ul></div>
        <div class="cons"><ul><li>EPC表单录入多，深色+表单体验下降</li></ul></div>
      </div>
    </div>
  </div>
</div>
